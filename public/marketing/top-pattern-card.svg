<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 200" fill="none">
  <defs>
    <linearGradient id="tpcBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0B2740"/>
      <stop offset="1" stop-color="#06263f"/>
    </linearGradient>
    <filter id="tpcShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect x="6" y="14" width="328" height="180" rx="18" fill="#000" opacity="0.55" filter="url(#tpcShadow)"/>
  <rect x="6" y="6"  width="328" height="180" rx="18" fill="url(#tpcBg)" stroke="#19d4f2" stroke-opacity="0.45"/>
  <text x="24" y="34" font-family="-apple-system, system-ui, sans-serif" font-size="10" font-weight="800" letter-spacing="1.4" fill="#19d4f2">TOP PATTERN</text>
  <text x="24" y="60" font-family="-apple-system, system-ui, sans-serif" font-size="20" font-weight="800" fill="#ffffff">Red Snapper</text>

  <g font-family="-apple-system, system-ui, sans-serif" font-size="10.5">
    <text x="24"  y="92"  fill="#94A3B8" letter-spacing="1">BEST MONTH</text>
    <text x="24"  y="112" fill="#ffffff" font-weight="700" font-size="14">June</text>

    <text x="130" y="92"  fill="#94A3B8" letter-spacing="1">BEST DEPTH</text>
    <text x="130" y="112" fill="#ffffff" font-weight="700" font-size="14">78–92 ft</text>

    <text x="24"  y="140" fill="#94A3B8" letter-spacing="1">TOP LOCATION</text>
    <text x="24"  y="160" fill="#ffffff" font-weight="700" font-size="14">Nine-Mile Reef</text>
  </g>

  <!-- Micro sparkline -->
  <polyline points="230,150 246,140 262,146 278,128 294,132 310,116"
            stroke="#19d4f2" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="310" cy="116" r="3" fill="#19d4f2"/>
</svg>
