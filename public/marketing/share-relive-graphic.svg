<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" fill="none">
  <defs>
    <linearGradient id="srCard" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0B2740"/>
      <stop offset="1" stop-color="#06263f"/>
    </linearGradient>
    <linearGradient id="srBub" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#19d4f2"/>
      <stop offset="1" stop-color="#13B4D0"/>
    </linearGradient>
    <filter id="srShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Big share preview card -->
  <rect x="30" y="40" width="320" height="360" rx="24" fill="#000" opacity="0.5" filter="url(#srShadow)"/>
  <rect x="30" y="30" width="320" height="360" rx="24" fill="url(#srCard)" stroke="#19d4f2" stroke-opacity="0.35"/>

  <!-- fake fish photo area -->
  <rect x="46" y="46" width="288" height="180" rx="16" fill="#031b33"/>
  <path d="M46 200 Q 130 170 210 200 T 334 200 L 334 226 L 46 226 Z" fill="#0a2a44"/>
  <ellipse cx="190" cy="140" rx="70" ry="24" fill="#0f5e85" opacity="0.7"/>
  <polygon points="120,140 100,120 100,160" fill="#0f5e85" opacity="0.7"/>

  <!-- caption block -->
  <rect x="46" y="248" width="140" height="14" rx="4" fill="#19d4f2" opacity="0.8"/>
  <rect x="46" y="272" width="230" height="18" rx="4" fill="#ffffff"/>
  <rect x="46" y="298" width="180" height="10" rx="4" fill="#94A3B8"/>
  <rect x="46" y="318" width="150" height="10" rx="4" fill="#94A3B8"/>

  <!-- share row -->
  <rect x="46" y="346" width="90" height="30" rx="10" fill="#19d4f2"/>
  <rect x="146" y="346" width="90" height="30" rx="10" fill="none" stroke="#19d4f2" stroke-width="1.5"/>
  <rect x="246" y="346" width="88" height="30" rx="10" fill="none" stroke="#19d4f2" stroke-width="1.5"/>

  <!-- Message bubbles right -->
  <g>
    <rect x="380" y="80"  width="130" height="46" rx="14" fill="url(#srBub)"/>
    <rect x="380" y="140" width="120" height="36" rx="14" fill="#0B2740" stroke="#19d4f2" stroke-opacity="0.55"/>
    <rect x="380" y="192" width="130" height="46" rx="14" fill="url(#srBub)"/>
    <rect x="380" y="254" width="110" height="36" rx="14" fill="#0B2740" stroke="#19d4f2" stroke-opacity="0.55"/>
  </g>

  <!-- envelope + heart icons -->
  <g stroke="#19d4f2" stroke-width="2" fill="none">
    <rect x="380" y="310" width="42" height="30" rx="4"/>
    <polyline points="380,314 401,326 422,314"/>
  </g>
  <g fill="#19d4f2">
    <path d="M448 320 C 448 314, 456 314, 458 320 C 460 314, 468 314, 468 320 C 468 328, 458 340, 458 340 C 458 340, 448 328, 448 320 Z"/>
  </g>
</svg>
