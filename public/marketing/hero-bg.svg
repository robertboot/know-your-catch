<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0"   stop-color="#0a2a44"/>
      <stop offset="0.55" stop-color="#052240"/>
      <stop offset="1"   stop-color="#020c1c"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#08334f"/>
      <stop offset="1" stop-color="#010714"/>
    </linearGradient>
    <radialGradient id="dawn" cx="0.75" cy="-0.05" r="0.75">
      <stop offset="0"    stop-color="#19d4f2" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#19d4f2" stop-opacity="0.06"/>
      <stop offset="1"    stop-color="#19d4f2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#19d4f2" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#19d4f2" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>

  <!-- Sky + dawn glow -->
  <rect width="1600" height="600" fill="url(#sky)"/>
  <ellipse cx="1200" cy="60" rx="700" ry="380" fill="url(#dawn)"/>

  <!-- Distant horizon glow -->
  <rect x="0" y="580" width="1600" height="20" fill="#19d4f2" opacity="0.12"/>

  <!-- Offshore oil rig silhouette on the left, faint -->
  <g fill="#000" opacity="0.55">
    <!-- deck -->
    <rect x="140" y="480" width="240" height="16"/>
    <!-- legs -->
    <path d="M158 496 L 170 600 L 176 600 L 165 496 Z"/>
    <path d="M240 496 L 244 600 L 250 600 L 248 496 Z"/>
    <path d="M320 496 L 328 600 L 334 600 L 328 496 Z"/>
    <path d="M362 496 L 372 600 L 378 600 L 370 496 Z"/>
    <!-- cross bracing -->
    <path d="M158 500 L 244 596 L 250 600 L 165 500 Z" opacity="0.4"/>
    <path d="M244 500 L 328 596 L 334 600 L 250 500 Z" opacity="0.4"/>
    <path d="M328 500 L 370 596 L 378 600 L 334 500 Z" opacity="0.4"/>
    <!-- derrick tower -->
    <path d="M200 480 L 210 380 L 260 380 L 268 480 Z"/>
    <rect x="222" y="330" width="24" height="52"/>
    <!-- flare boom -->
    <path d="M380 490 L 460 470 L 456 480 L 380 500 Z" opacity="0.5"/>
    <circle cx="465" cy="468" r="6" fill="#19d4f2" opacity="0.5"/>
  </g>

  <!-- Sea surface -->
  <rect y="600" width="1600" height="300" fill="url(#sea)"/>

  <!-- Wave lines -->
  <g stroke="#19d4f2" stroke-opacity="0.14" fill="none">
    <path d="M0 620 Q 200 604 400 620 T 800 620 T 1200 620 T 1600 620"/>
    <path d="M0 660 Q 220 640 440 660 T 880 660 T 1320 660 T 1600 660" stroke-opacity="0.12"/>
    <path d="M0 710 Q 260 686 520 710 T 1040 710 T 1560 710" stroke-opacity="0.1"/>
    <path d="M0 780 Q 260 750 520 780 T 1040 780 T 1560 780" stroke-opacity="0.08"/>
  </g>

  <!-- Cyan glow motes -->
  <g fill="#19d4f2" opacity="0.5">
    <circle cx="200" cy="230" r="1.4"/>
    <circle cx="380" cy="180" r="1"/>
    <circle cx="620" cy="260" r="1.6"/>
    <circle cx="820" cy="140" r="1.2"/>
    <circle cx="1060" cy="220" r="1.4"/>
    <circle cx="1280" cy="150" r="1"/>
    <circle cx="1460" cy="260" r="1.6"/>
    <circle cx="140" cy="360" r="1.2"/>
    <circle cx="380" cy="420" r="1"/>
    <circle cx="640" cy="460" r="1.4"/>
    <circle cx="900" cy="420" r="1.2"/>
    <circle cx="1140" cy="470" r="1"/>
    <circle cx="1360" cy="420" r="1.4"/>
  </g>

  <!-- Depth glow blobs -->
  <g opacity="0.35" filter="url(#blur)">
    <ellipse cx="1080" cy="640" rx="240" ry="80" fill="#19d4f2"/>
    <ellipse cx="400"  cy="740" rx="200" ry="60" fill="#19d4f2"/>
  </g>
</svg>
