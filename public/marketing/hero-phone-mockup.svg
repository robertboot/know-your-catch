<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 900" fill="none">
  <defs>
    <linearGradient id="frame" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1a2740"/>
      <stop offset="1" stop-color="#050e1c"/>
    </linearGradient>
    <linearGradient id="mapSea" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0f3a5a"/>
      <stop offset="1" stop-color="#031b33"/>
    </linearGradient>
    <radialGradient id="pinGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#19d4f2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#19d4f2" stop-opacity="0"/>
    </radialGradient>
    <filter id="phoneShadow" x="-20%" y="-10%" width="140%" height="120%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Drop shadow -->
  <rect x="10" y="30" width="420" height="860" rx="60" fill="#000" opacity="0.55" filter="url(#phoneShadow)"/>

  <!-- Phone body -->
  <rect x="10" y="20" width="420" height="860" rx="58" fill="url(#frame)" stroke="#19d4f2" stroke-opacity="0.35" stroke-width="1"/>
  <rect x="22" y="32" width="396" height="836" rx="48" fill="#031b33"/>

  <!-- Notch -->
  <rect x="170" y="34" width="100" height="26" rx="13" fill="#000"/>

  <!-- Screen content — map background -->
  <rect x="22" y="60" width="396" height="808" rx="0" fill="url(#mapSea)"/>

  <!-- Top status/header -->
  <rect x="42" y="82" width="180" height="18" rx="9" fill="#19d4f2" opacity="0.85"/>
  <rect x="42" y="108" width="120" height="10" rx="5" fill="#ffffff" opacity="0.6"/>

  <!-- Map coastline -->
  <path d="M22 460 Q 100 420 190 460 T 340 470 T 418 450 L 418 868 L 22 868 Z" fill="#0a2a44" opacity="0.85"/>
  <path d="M22 500 Q 110 480 190 495 T 340 510 T 418 495 L 418 868 L 22 868 Z" fill="#082139" opacity="0.7"/>

  <!-- Grid lines -->
  <g stroke="#0f5e85" stroke-opacity="0.3" stroke-width="1">
    <line x1="22" y1="200" x2="418" y2="200"/>
    <line x1="22" y1="280" x2="418" y2="280"/>
    <line x1="22" y1="360" x2="418" y2="360"/>
    <line x1="22" y1="440" x2="418" y2="440"/>
    <line x1="100" y1="60" x2="100" y2="500"/>
    <line x1="200" y1="60" x2="200" y2="500"/>
    <line x1="300" y1="60" x2="300" y2="500"/>
  </g>

  <!-- Catch pins (map markers) with glows -->
  <g>
    <circle cx="130" cy="250" r="34" fill="url(#pinGlow)"/>
    <circle cx="130" cy="250" r="9"  fill="#19d4f2"/>
    <circle cx="130" cy="250" r="4"  fill="#ffffff"/>
  </g>
  <g>
    <circle cx="245" cy="320" r="34" fill="url(#pinGlow)"/>
    <circle cx="245" cy="320" r="9"  fill="#19d4f2"/>
    <circle cx="245" cy="320" r="4"  fill="#ffffff"/>
  </g>
  <g>
    <circle cx="330" cy="200" r="30" fill="url(#pinGlow)"/>
    <circle cx="330" cy="200" r="8"  fill="#19d4f2"/>
    <circle cx="330" cy="200" r="4"  fill="#ffffff"/>
  </g>
  <g>
    <circle cx="180" cy="400" r="30" fill="url(#pinGlow)"/>
    <circle cx="180" cy="400" r="8"  fill="#19d4f2"/>
    <circle cx="180" cy="400" r="4"  fill="#ffffff"/>
  </g>
  <g>
    <circle cx="290" cy="420" r="30" fill="url(#pinGlow)"/>
    <circle cx="290" cy="420" r="8"  fill="#19d4f2"/>
    <circle cx="290" cy="420" r="4"  fill="#ffffff"/>
  </g>

  <!-- Bottom card overlay -->
  <rect x="42" y="580" width="356" height="180" rx="20" fill="#0B2740" stroke="#19d4f2" stroke-opacity="0.35"/>
  <rect x="60" y="600" width="140" height="14" rx="4" fill="#19d4f2" opacity="0.9"/>
  <rect x="60" y="622" width="220" height="20" rx="4" fill="#ffffff" opacity="0.95"/>
  <rect x="60" y="654" width="180" height="10" rx="4" fill="#94A3B8"/>
  <rect x="60" y="672" width="140" height="10" rx="4" fill="#94A3B8"/>
  <rect x="60" y="702" width="140" height="34" rx="10" fill="#19d4f2"/>
  <rect x="216" y="702" width="140" height="34" rx="10" fill="none" stroke="#19d4f2" stroke-width="1.5"/>

  <!-- Tab bar -->
  <rect x="42" y="792" width="356" height="60" rx="18" fill="#0B2740" stroke="#19d4f2" stroke-opacity="0.35"/>
  <g fill="#19d4f2">
    <circle cx="90" cy="822" r="4"/>
    <circle cx="170" cy="822" r="4" opacity="0.35"/>
    <circle cx="220" cy="822" r="10"/>
    <circle cx="270" cy="822" r="4" opacity="0.35"/>
    <circle cx="350" cy="822" r="4" opacity="0.35"/>
  </g>
</svg>
