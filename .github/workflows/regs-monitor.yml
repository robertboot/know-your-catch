name: Regulations source monitor

# Detection only: checks official sources for changes and opens a PR so a
# human re-verifies and updates the feed. Never edits regulation data.

on:
  schedule:
    - cron: '0 12 * * 1'   # weekly, Mondays 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: regs-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node regulations/monitor.mjs
      - uses: peter-evans/create-pull-request@v6
        with:
          branch: regs-monitor/source-change
          title: "Regulations source change detected — re-verify feed"
          commit-message: "chore(regs): record source hashes; flag changes for review"
          body-path: regulations/MONITOR_REPORT.md
          add-paths: |
            regulations/.sources.json
            regulations/MONITOR_REPORT.md
          delete-branch: true
